name: CI

on:
  push:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root123
          POSTGRES_DB: environmentgpt
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d environmentgpt"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: true
      JWT_SECRET: test-jwt-secret
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root123
      POSTGRES_DB: environmentgpt
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql://postgres:root123@127.0.0.1:5432/environmentgpt?schema=public

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser dependencies
        run: npx playwright install --with-deps chromium

      - name: Run Jest suite
        run: npm test -- --runInBand

      - name: Enforce coverage thresholds
        run: npm run test:coverage -- --runInBand --coverageReporters=text-summary

      - name: Run Playwright suite
        run: npm run test:e2e

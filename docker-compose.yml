# =====================================================
# EPA Punjab EnvironmentGPT - Docker Compose
# Phase 9: Deployment & Infrastructure
# Monorepo: frontend (port 3000) + backend (port 3001)
# =====================================================
# Usage:
#   Development: docker-compose up -d
#   Production:  docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =====================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: environmentgpt-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-environmentgpt}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - environmentgpt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-environmentgpt}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ==================== Backend (API) ====================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: environmentgpt-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/environmentgpt?schema=public}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-this-in-production}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - ENABLE_CACHE=${ENABLE_CACHE:-true}
      - CACHE_TTL=${CACHE_TTL:-3600}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - app-logs:/app/logs
    networks:
      - environmentgpt-network
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==================== Frontend (UI) ====================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: environmentgpt-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BACKEND_URL=http://backend:3001
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-this-in-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - environmentgpt-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==================== Ollama LLM Service ====================
  ollama:
    image: ollama/ollama:latest
    container_name: environmentgpt-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - environmentgpt-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ==================== Nginx Reverse Proxy ====================
  nginx:
    image: nginx:alpine
    container_name: environmentgpt-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    networks:
      - environmentgpt-network
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy

  # ==================== Redis Cache (Optional) ====================
  redis:
    image: redis:7-alpine
    container_name: environmentgpt-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - environmentgpt-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==================== Backup Service ====================
  backup:
    image: postgres:16-alpine
    container_name: environmentgpt-backup
    restart: unless-stopped
    volumes:
      - backup-data:/backup
    networks:
      - environmentgpt-network
    environment:
      - BACKUP_INTERVAL=${BACKUP_INTERVAL:-daily}
      - BACKUP_RETENTION=${BACKUP_RETENTION:-7}
      - PGPASSWORD=${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: |
      sh -c '
        while true; do
          TIMESTAMP=$$(date +%Y%m%d_%H%M%S)
          pg_dump -h postgres -U ${POSTGRES_USER:-postgres} ${POSTGRES_DB:-environmentgpt} | gzip > /backup/backup_$$TIMESTAMP.sql.gz
          find /backup -name "backup_*.sql.gz" -mtime +$$BACKUP_RETENTION -delete
          sleep 86400
        done
      '

# ==================== Networks ====================
networks:
  environmentgpt-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ==================== Volumes ====================
volumes:
  postgres-data:
    driver: local
  app-logs:
    driver: local
  ollama-data:
    driver: local
  redis-data:
    driver: local
  nginx-logs:
    driver: local
  backup-data:
    driver: local

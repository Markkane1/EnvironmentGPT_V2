# =====================================================
# EPA Punjab EnvironmentGPT - Prometheus Configuration
# Phase 9: Deployment & Infrastructure
# =====================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'environmentgpt-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  # ==================== Application Metrics ====================
  - job_name: 'environmentgpt-app'
    static_configs:
      - targets: ['app:3000']
    metrics_path: '/api/metrics'

  # ==================== Node Exporter ====================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # ==================== Redis ====================
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  # ==================== Nginx ====================
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:9113']

  # ==================== Prometheus ====================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

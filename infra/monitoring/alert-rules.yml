# =====================================================
# EPA Punjab EnvironmentGPT - Alert Rules
# Phase 9: Deployment & Infrastructure
# =====================================================

groups:
  - name: environmentgpt-alerts
    rules:
      # ==================== Application Health ====================
      - alert: ApplicationDown
        expr: up{job="environmentgpt-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "EnvironmentGPT application is down"
          description: "EnvironmentGPT application has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 10% for the last 5 minutes."

      - alert: SlowResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow response time detected"
          description: "95th percentile response time is above 5 seconds."

      # ==================== Resource Usage ====================
      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 90% for 5 minutes."

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 90% for 5 minutes."

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space"
          description: "Disk space is below 10% remaining."

      # ==================== Database ====================
      - alert: DatabaseConnectionFailed
        expr: db_connection_errors_total > 5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database connection failures"
          description: "Multiple database connection failures detected."

      # ==================== Cache ====================
      - alert: LowCacheHitRate
        expr: cache_hit_rate < 0.3
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low cache hit rate"
          description: "Cache hit rate is below 30% for 10 minutes."

      # ==================== Ollama LLM ====================
      - alert: OllamaServiceDown
        expr: up{job="ollama"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Ollama LLM service is down"
          description: "Ollama service has been down for more than 1 minute."

      - alert: HighLLMLatency
        expr: llm_response_time_seconds > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High LLM response latency"
          description: "LLM response time is above 30 seconds."
